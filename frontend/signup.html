<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Artist Tour Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css?v=20260208" />
    <link rel="stylesheet" href="css/components.css?v=20260208" />
    <link rel="stylesheet" href="css/layout.css?v=20260208" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h2>Create your owner account</h2>
        <p>Register to manage your artists and tours.</p>
        <form>
          <div class="input-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="owner_username" />
          </div>
          <div class="input-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Create a password" />
          </div>
          <div class="input-group">
            <label for="confirm">Confirm Password</label>
            <input id="confirm" type="password" placeholder="Confirm password" />
          </div>
          <p class="signup-error text-error"></p>
          <button class="btn btn-primary btn-block" type="submit">Create account</button>
        </form>
        <div class="auth-links">
          <a href="login.html">Already have an account? Log in</a>
        </div>
      </div>
    </div>

    <!-- Core scripts -->
    <script src="js/api.js?v=20260208"></script>
    <script src="js/components.js?v=20260208"></script>
    <script src="js/pages/auth.js?v=20260208"></script>
    <script src="js/main.js?v=20260208"></script>
  </body>
</html>
